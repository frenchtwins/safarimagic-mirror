<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Safari">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="/safari/manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="/safari/icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" href="/safari/icons/icon-192.png">
  <title>Safari</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; touch-action:manipulation; }
  :root {
    --bg: #f2f2f7;
    --card: #fff;
    --text: #000;
    --text-2: #8e8e93;
    --text-3: #c7c7cc;
    --blue: #007aff;
    --sep: rgba(60,60,67,0.1);
    --toolbar-bg: rgba(249,249,249,0.94);
    --url-bg: rgba(118,118,128,0.12);
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --card: #1c1c1e;
      --text: #fff;
      --text-2: #98989f;
      --text-3: #545458;
      --blue: #0a84ff;
      --sep: rgba(255,255,255,0.15);
      --toolbar-bg: rgba(18,18,18,0.92);
      --url-bg: rgba(118,118,128,0.24);
      --shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
  }
  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; }

  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top, 20px);
    position: relative;
  }

  /* ===== HOME ===== */
  .home { padding: 20px 16px 140px; }
  .home-header {
    padding: 10px 0 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .home-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .edit-btn {
    color: var(--blue); font-size: 17px; background: none; border: none; font-family: inherit; cursor: pointer; padding: 4px 8px; margin-right: -8px;
  }

  .favorites {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px 10px;
    padding: 8px 0 12px;
  }
  .fav { display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .fav-icon {
    width: 62px; height: 62px;
    border-radius: 14px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
    box-shadow: var(--shadow);
  }
  .fav-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 14px;
    display: block;
  }
  .fav-label {
    font-size: 11px;
    font-weight: 400;
    color: var(--text);
    text-align: center;
    line-height: 1.18;
    max-width: 76px;
    word-break: break-word;
  }

  .privacy-card {
    background: var(--card);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; gap: 12px; align-items: center;
    margin-top: 24px;
    box-shadow: var(--shadow);
  }
  .privacy-shield {
    width: 24px; height: 24px;
    color: var(--text-2); display: flex; align-items: center; justify-content: center;
  }
  .privacy-shield svg { width: 22px; height: 22px; }
  .privacy-body { flex: 1; }
  .privacy-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .privacy-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; line-height: 1.3; }

  /* ===== RESULTS ===== */
  .results { display: none; padding: 0 16px 140px; }
  .results.active { display: block; }
  .result-tabs {
    display: flex; gap: 24px; padding: 12px 0 10px;
    border-bottom: 0.5px solid var(--sep);
    overflow-x: auto; white-space: nowrap;
    scrollbar-width: none;
  }
  .result-tabs::-webkit-scrollbar { display: none; }
  .result-tab {
    font-size: 15px;
    color: var(--text-2);
    padding: 4px 0 6px;
    font-weight: 400;
    cursor: pointer;
    position: relative;
  }
  .result-tab.active {
    color: var(--text);
    font-weight: 500;
  }
  .result-tab.active::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -10px;
    height: 2px;
    background: var(--text);
    border-radius: 1px;
  }
  .results-count { font-size: 13px; color: var(--text-2); padding: 14px 0 0; }

  .result-item { padding: 16px 0; border-bottom: 0.5px solid var(--sep); }
  .result-site {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text);
    margin-bottom: 2px;
  }
  .result-favicon {
    width: 18px; height: 18px; border-radius: 4px;
    background: var(--url-bg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .result-favicon img { width: 100%; height: 100%; object-fit: cover; }
  .result-title {
    font-size: 17px; color: var(--blue);
    font-weight: 400;
    margin: 4px 0 2px;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .result-snippet {
    font-size: 14px; color: var(--text-2);
    line-height: 1.35;
  }

  /* ===== WEBVIEW ===== */
  .webview { display: none; width: 100%; height: 100%; position: absolute; inset: 0; background: var(--card); }
  .webview.active { display: block; }
  .webview iframe { width: 100%; height: 100%; border: none; background: var(--card); }

  /* ===== BOTTOM BAR ===== */
  .bottom {
    padding-bottom: env(safe-area-inset-bottom, 8px);
    background: var(--toolbar-bg);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--sep);
    position: relative; z-index: 10;
  }
  .url-bar-wrap { padding: 8px 16px 4px; }
  .url-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--url-bg);
    border-radius: 12px;
    padding: 0 12px;
    cursor: text;
    height: 40px;
  }
  .url-bar-icon { color: var(--text-2); display: flex; }
  .url-bar-icon svg { width: 14px; height: 14px; }
  .url-bar-text {
    flex: 1;
    font-size: 16px;
    color: var(--text-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-align: center;
    font-weight: 400;
  }
  .url-bar-text.placeholder { color: var(--text-2); }
  .url-bar-text.active { color: var(--text); text-align: left; }
  .url-bar-reload {
    color: var(--blue); padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .url-bar-reload svg { width: 16px; height: 16px; }

  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 18px 2px;
    height: 48px;
  }
  .tool {
    color: var(--blue); cursor: pointer;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; font-family: inherit;
    transition: opacity 0.15s;
  }
  .tool:active { opacity: 0.5; }
  .tool.disabled { color: var(--text-3); pointer-events: none; }
  .tool svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .tool.chev svg { stroke-width: 2.5; }

  /* ===== SEARCH OVERLAY ===== */
  .search-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .search-overlay.active { display: flex; }
  .search-top {
    display: flex; gap: 10px; align-items: center;
    padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
    padding-left: 12px; padding-right: 12px; padding-bottom: 10px;
  }
  .search-input {
    flex: 1;
    background: var(--url-bg);
    border: none; border-radius: 12px;
    padding: 10px 14px;
    font-size: 17px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    height: 40px;
  }
  .search-cancel {
    color: var(--blue); font-size: 17px; background: none; border: none;
    font-family: inherit; padding: 8px 4px; cursor: pointer;
  }
  .search-suggestions { flex: 1; overflow-y: auto; padding: 4px 0; }
  .sug {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px;
    font-size: 15px; color: var(--text);
    border-bottom: 0.5px solid var(--sep);
    cursor: pointer;
  }
  .sug-icon {
    width: 18px; height: 18px; color: var(--text-2);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sug-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }
  .sug-text { flex: 1; }
  .sug .arrow {
    width: 20px; height: 20px;
    color: var(--text-3);
    transform: rotate(-45deg);
  }
  .sug .arrow svg { width: 100%; height: 100%; }

  /* ===== TABS OVERLAY ===== */
  .tabs-overlay {
    position: fixed; inset: 0;
    background: #000;
    z-index: 99;
    display: none;
    flex-direction: column;
    padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
    color: #fff;
  }
  .tabs-overlay.active { display: flex; }
  .tabs-top { display: flex; justify-content: space-between; align-items: center; padding: 14px 4px 0; }
  .tabs-count { font-size: 14px; color: #8e8e93; }
  .tabs-done { color: var(--blue); font-size: 17px; background: none; border: none; font-family: inherit; font-weight: 600; cursor: pointer; padding: 8px; }
  .tabs-grid {
    flex: 1; overflow-y: auto;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    padding: 16px 4px;
  }
  .tab-card {
    background: #2c2c2e;
    border-radius: 14px;
    aspect-ratio: 3/4;
    display: flex; flex-direction: column;
    cursor: pointer;
    overflow: hidden;
    position: relative;
  }
  .tab-card.active { outline: 4px solid var(--blue); outline-offset: -4px; }
  .tab-card-header {
    padding: 10px 12px; display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.3);
  }
  .tab-card-favicon { width: 16px; height: 16px; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .tab-card-favicon img { width: 100%; height: 100%; object-fit: cover; }
  .tab-card-title { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tab-card-close { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: #8e8e93; }
  .tab-card-body {
    flex: 1; padding: 12px; font-size: 13px; color: #98989f;
    background: #1c1c1e;
    display: flex; align-items: center; justify-content: center; text-align: center;
  }
  .tabs-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px;
  }
  .tabs-bottom-btn {
    color: var(--blue); background: none; border: none; font-family: inherit;
    font-size: 17px; cursor: pointer; padding: 8px;
  }
  .tabs-bottom-btn.plus { font-size: 28px; font-weight: 200; }

  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="content" id="content">

  <!-- HOME -->
  <div class="home" id="home">
    <div class="home-header">
      <div class="home-title">Favoris</div>
      <button class="edit-btn">Modifier</button>
    </div>
    <div class="favorites" id="favorites"></div>

    <div class="privacy-card">
      <div class="privacy-shield">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l7 3v6c0 4.5-3 8.5-7 10-4-1.5-7-5.5-7-10V5l7-3z"/></svg>
      </div>
      <div class="privacy-body">
        <div class="privacy-title">Rapport de confidentialité</div>
        <div class="privacy-sub">Au cours des sept derniers jours, 13 traqueurs bloqués.</div>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <div class="result-tabs" id="resultTabs">
      <div class="result-tab active">Tous</div>
      <div class="result-tab">Images</div>
      <div class="result-tab">Vidéos</div>
      <div class="result-tab">Actualités</div>
      <div class="result-tab">Achats</div>
      <div class="result-tab">Lieux</div>
      <div class="result-tab">Livres</div>
    </div>
    <div class="results-count" id="resultsCount"></div>
    <div id="resultsList"></div>
  </div>

  <!-- WEBVIEW -->
  <div class="webview" id="webview">
    <iframe id="webviewFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups" referrerpolicy="no-referrer"></iframe>
  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="url-bar-wrap">
    <div class="url-bar" id="urlBar" onclick="openSearch()">
      <span class="url-bar-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 018 0v4"/>
        </svg>
      </span>
      <div class="url-bar-text placeholder" id="urlBarText">Rechercher ou saisir un site</div>
      <span class="url-bar-reload" id="urlBarReload" style="display:none;" onclick="event.stopPropagation(); reload();">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0115.5-6.3L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 01-15.5 6.3L3 16"/>
          <path d="M3 21v-5h5"/>
        </svg>
      </span>
    </div>
  </div>
  <div class="toolbar">
    <button class="tool chev" id="backBtn" onclick="goBack()" aria-label="Précédent">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
    <button class="tool chev disabled" id="fwdBtn" onclick="goForward()" aria-label="Suivant">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
    <button class="tool" onclick="doShare()" aria-label="Partager">
      <svg viewBox="0 0 24 24"><path d="M12 3v13"/><polyline points="7 8 12 3 17 8"/><path d="M5 13v6a2 2 0 002 2h10a2 2 0 002-2v-6"/></svg>
    </button>
    <button class="tool" onclick="doBookmarks()" aria-label="Signets">
      <svg viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h14v16H6a2 2 0 01-2-2V6z"/><path d="M20 18H6a2 2 0 000 4h14"/></svg>
    </button>
    <button class="tool" onclick="openTabs()" aria-label="Onglets">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="12" height="12" rx="2"/><rect x="8" y="8" width="12" height="12" rx="2"/></svg>
    </button>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-top">
    <input type="text" class="search-input" id="searchInput" placeholder="Rechercher ou saisir un site" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="search-cancel" onclick="closeSearch()">Annuler</button>
  </div>
  <div class="search-suggestions" id="suggestions"></div>
</div>

<!-- TABS OVERLAY -->
<div class="tabs-overlay" id="tabsOverlay">
  <div class="tabs-top">
    <div class="tabs-count" id="tabsCount">1 onglet</div>
    <button class="tabs-done" onclick="closeTabs()">OK</button>
  </div>
  <div class="tabs-grid" id="tabsGrid"></div>
  <div class="tabs-bottom">
    <button class="tabs-bottom-btn">Privée</button>
    <button class="tabs-bottom-btn plus" onclick="newTab()">+</button>
    <button class="tabs-bottom-btn" onclick="closeTabs()">OK</button>
  </div>
</div>

<script>
/* ====================================================================
 * EINSTEIN WEB — Safari clone (pixel-closer). Streams all events to mirror.
 * ==================================================================== */

// ===== Favorites with REAL favicons (fetched from DuckDuckGo CDN) =====
const FAVORITES = [
  { name:'Dropbox',            url:'https://www.dropbox.com',        host:'dropbox.com' },
  { name:'YouTube',             url:'https://m.youtube.com',          host:'youtube.com' },
  { name:'TripAdvisor',         url:'https://www.tripadvisor.com',    host:'tripadvisor.com' },
  { name:'Facebook',            url:'https://m.facebook.com',         host:'facebook.com' },
  { name:'Google Traduction',   url:'https://translate.google.com',   host:'translate.google.com' },
  { name:'Gmail',               url:'https://mail.google.com',        host:'mail.google.com' },
  { name:'Apple',               url:'https://www.apple.com',          host:'apple.com' },
  { name:'Les French Twins',    url:'https://www.lesfrenchtwins.com', host:'lesfrenchtwins.com' },
  { name:'LinkedIn',            url:'https://www.linkedin.com',       host:'linkedin.com' },
  { name:'Google',              url:'https://www.google.com',         host:'google.com' },
  { name:'Instagram',           url:'https://www.instagram.com',      host:'instagram.com' },
  { name:'Wikipedia',           url:'https://fr.wikipedia.org',       host:'wikipedia.org' },
];

const faviconUrl = (host) => `https://icons.duckduckgo.com/ip3/${host}.ico`;

// Session / state
let ws = null;
let currentPage = { type:'home', url:'', title:'' };
let history = [];
let tabs = [{ title:'Favoris', host:'', type:'home' }];
let sessionId = localStorage.getItem('einstein_session') || (Math.random().toString(36).slice(2)+Date.now().toString(36));
localStorage.setItem('einstein_session', sessionId);
let typingBuffer = '';

// ===== WebSocket with persistence =====
function connectWS() {
  const url = (location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws';
  ws = new WebSocket(url);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type:'identify', role:'phone', sessionId }));
    send({ type:'app_state', state:'active' });
    resyncState();
  };
  ws.onclose = () => setTimeout(connectWS, 1500);
  ws.onerror = () => { try { ws.close(); } catch(e) {} };
}
function send(event) {
  const payload = Object.assign({ timestamp: new Date().toISOString() }, event);
  try { if (ws && ws.readyState === 1) ws.send(JSON.stringify(payload)); } catch(e) {}
}
function resyncState() {
  if (currentPage.type === 'home') {
    send({ type:'navigation', url:'https://start', title:'Favoris' });
  } else if (currentPage.type === 'results') {
    send({ type:'search', query: currentPage.query, url: currentPage.url });
    send({ type:'page_loaded', url: currentPage.url, title: currentPage.title });
  } else if (currentPage.type === 'webview') {
    send({ type:'navigation', url: currentPage.url, title: currentPage.title });
    send({ type:'page_loaded', url: currentPage.url, title: currentPage.title });
  }
  if (typingBuffer) send({ type:'keystroke', character:'', currentText: typingBuffer, source:'resync' });
}

// ===== Render favorites with real favicons =====
function renderFavorites() {
  const grid = document.getElementById('favorites');
  grid.innerHTML = FAVORITES.map((f, i) => `
    <div class="fav" data-i="${i}">
      <div class="fav-icon">
        <img src="${faviconUrl(f.host)}" alt="${escapeAttr(f.name)}" loading="lazy" onerror="this.style.display='none'; this.parentElement.textContent='${escapeAttr(f.name.charAt(0))}'; this.parentElement.style.fontSize='24px'; this.parentElement.style.fontWeight='700'; this.parentElement.style.color='#8e8e93';" />
      </div>
      <div class="fav-label">${escapeHtml(f.name)}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.fav').forEach(el => {
    el.addEventListener('click', () => {
      const f = FAVORITES[+el.dataset.i];
      send({ type:'link_click', linkText:f.name, href:f.url });
      openURL(f.url, f.name);
    });
  });
}

// ===== Search overlay =====
function openSearch() {
  document.getElementById('searchOverlay').classList.add('active');
  const input = document.getElementById('searchInput');
  input.value = '';
  input.focus();
  typingBuffer = '';
  renderSuggestions('');
  send({ type:'app_state', state:'active', note:'search_opened' });
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('active');
  typingBuffer = '';
  send({ type:'app_state', state:'active', note:'search_closed' });
}
function renderSuggestions(query) {
  const wrap = document.getElementById('suggestions');
  if (!query) { wrap.innerHTML = ''; return; }
  const suggestions = [
    { icon:'search', text: query + ' — Recherche' },
    { icon:'search', text: query + ' en ligne' },
    { icon:'search', text: query + ' wikipedia' },
    { icon:'search', text: query + ' youtube' },
    { icon:'search', text: query + ' définition' },
  ];
  const searchSvg = `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16 16l4 4"/></svg>`;
  const arrowSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>`;
  wrap.innerHTML = suggestions.map(s =>
    `<div class="sug" data-q="${escapeAttr(s.text.replace(/ — Recherche$/,''))}">
       <div class="sug-icon">${searchSvg}</div>
       <div class="sug-text">${escapeHtml(s.text)}</div>
       <div class="arrow">${arrowSvg}</div>
     </div>`
  ).join('');
  wrap.querySelectorAll('.sug').forEach(el => {
    el.addEventListener('click', () => doSearch(el.dataset.q));
  });
}

// Track keystrokes in search input
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', (e) => {
  const newVal = e.target.value;
  if (newVal.length > typingBuffer.length) {
    const chars = newVal.slice(typingBuffer.length);
    for (let i = 0; i < chars.length; i++) {
      send({ type:'keystroke', character: chars[i], currentText: newVal.slice(0, typingBuffer.length + i + 1) });
    }
  } else if (newVal.length < typingBuffer.length) {
    for (let j = 0; j < typingBuffer.length - newVal.length; j++) {
      send({ type:'keystroke', character: '⌫', currentText: newVal });
    }
  }
  typingBuffer = newVal;
  renderSuggestions(newVal);
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); doSearch(e.target.value); }
});

// ===== Search =====
async function doSearch(query) {
  if (!query || !query.trim()) return;
  typingBuffer = '';
  closeSearch();
  send({ type:'search', query, url:'https://www.google.com/search?q='+encodeURIComponent(query) });
  showResults(query);
}

async function showResults(query) {
  history.push(currentPage);
  currentPage = { type:'results', url:'https://www.google.com/search?q='+encodeURIComponent(query), title: query + ' — Recherche Google', query };
  tabs[0] = { title: currentPage.title, host:'google.com', type:'results' };
  updateBackBtn();
  document.getElementById('home').style.display='none';
  document.getElementById('results').classList.add('active');
  document.getElementById('webview').classList.remove('active');
  updateUrlBar('google.com', true);
  document.getElementById('content').scrollTop = 0;

  const list = document.getElementById('resultsList');
  const count = document.getElementById('resultsCount');
  count.textContent = 'Chargement…';
  list.innerHTML = '';

  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(query)).then(r => r.json());
    const items = (res && res.results) || [];
    count.textContent = 'Environ ' + (res.total || items.length) + ' résultats';
    list.innerHTML = items.map((r, i) => `
      <div class="result-item" data-i="${i}">
        <div class="result-site">
          <div class="result-favicon">
            <img src="${faviconUrl(r.host||'')}" alt="" onerror="this.style.display='none'; this.parentElement.textContent='${(r.host||'').charAt(0).toUpperCase()}'; this.parentElement.style.fontSize='10px'; this.parentElement.style.fontWeight='700'; this.parentElement.style.color='var(--text-2)';" />
          </div>
          <span>${escapeHtml(r.host || '')}</span>
        </div>
        <div class="result-title">${escapeHtml(r.title || '')}</div>
        <div class="result-snippet">${escapeHtml(r.snippet || '')}</div>
      </div>
    `).join('');
    list.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        const r = items[+el.dataset.i];
        send({ type:'link_click', linkText: r.title, href: r.url });
        openURL(r.url, r.title);
      });
    });
    send({ type:'page_loaded', url: currentPage.url, title: currentPage.title });
  } catch (e) {
    count.textContent = 'Erreur de chargement';
  }
}

function openURL(url, title) {
  history.push(currentPage);
  currentPage = { type:'webview', url, title };
  tabs[0] = { title, host: hostFromUrl(url), type:'webview' };
  updateBackBtn();
  document.getElementById('home').style.display='none';
  document.getElementById('results').classList.remove('active');
  document.getElementById('webview').classList.add('active');
  const frame = document.getElementById('webviewFrame');
  frame.src = '/api/proxy?url=' + encodeURIComponent(url);
  updateUrlBar(hostFromUrl(url), true);
  send({ type:'navigation', url, title });
}

function updateUrlBar(text, showReload) {
  const bar = document.getElementById('urlBarText');
  bar.textContent = text || 'Rechercher ou saisir un site';
  bar.classList.toggle('placeholder', !text);
  bar.classList.toggle('active', !!text);
  document.getElementById('urlBarReload').style.display = showReload ? 'flex' : 'none';
}

function reload() {
  if (currentPage.type === 'webview') {
    const frame = document.getElementById('webviewFrame');
    frame.src = frame.src;
  } else if (currentPage.type === 'results') {
    showResults(currentPage.query);
  }
}

function goBack() {
  if (history.length === 0) { goHome(); return; }
  const prev = history.pop();
  send({ type:'navigation', url: prev.url || 'home', title: prev.title || 'Favoris', backButton: true });
  if (prev.type === 'home') goHome(false);
  else if (prev.type === 'results') {
    currentPage = prev;
    document.getElementById('home').style.display='none';
    document.getElementById('results').classList.add('active');
    document.getElementById('webview').classList.remove('active');
    showResults(prev.query);
  } else if (prev.type === 'webview') {
    openURL(prev.url, prev.title);
    history.pop();
  }
  updateBackBtn();
}
function goForward() {}
function goHome(pushHistory = true) {
  if (pushHistory) history.push(currentPage);
  currentPage = { type:'home', url:'', title:'Favoris' };
  tabs[0] = { title:'Favoris', host:'', type:'home' };
  document.getElementById('home').style.display='block';
  document.getElementById('results').classList.remove('active');
  document.getElementById('webview').classList.remove('active');
  updateUrlBar('', false);
  updateBackBtn();
}
function updateBackBtn() {
  const btn = document.getElementById('backBtn');
  btn.classList.toggle('disabled', history.length === 0 && currentPage.type === 'home');
}

function doShare() {}
function doBookmarks() {}

// ===== Tabs overlay =====
function openTabs() {
  const overlay = document.getElementById('tabsOverlay');
  overlay.classList.add('active');
  const grid = document.getElementById('tabsGrid');
  document.getElementById('tabsCount').textContent = tabs.length + ' onglet' + (tabs.length>1?'s':'');
  grid.innerHTML = tabs.map((t, i) => {
    const fav = t.host ? `<img src="${faviconUrl(t.host)}" onerror="this.style.display='none';" />` : '';
    return `
      <div class="tab-card ${i===0?'active':''}" data-i="${i}">
        <div class="tab-card-header">
          <div class="tab-card-favicon">${fav}</div>
          <div class="tab-card-title">${escapeHtml(t.host || t.title || 'Favoris')}</div>
          <div class="tab-card-close">✕</div>
        </div>
        <div class="tab-card-body">${escapeHtml(t.title || '')}</div>
      </div>
    `;
  }).join('');
  grid.querySelectorAll('.tab-card').forEach(el => el.addEventListener('click', () => closeTabs()));
}
function closeTabs() { document.getElementById('tabsOverlay').classList.remove('active'); }
function newTab() { closeTabs(); goHome(); }

// ===== Helpers =====
function hostFromUrl(u) { try { return new URL(u).hostname.replace(/^www\./,''); } catch { return u||''; } }
function escapeHtml(s) { if(s==null)return''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }

// Track scroll
let lastScroll = 0, scrollThrottle = null;
document.getElementById('content').addEventListener('scroll', (e) => {
  if (scrollThrottle) return;
  scrollThrottle = setTimeout(() => {
    const el = e.target;
    const dir = el.scrollTop > lastScroll ? 'down' : 'up';
    lastScroll = el.scrollTop;
    send({ type:'scroll', offsetY: el.scrollTop, contentHeight: el.scrollHeight, viewHeight: el.clientHeight, direction: dir });
    scrollThrottle = null;
  }, 300);
});

// iframe events
window.addEventListener('message', (e) => {
  if (e.data && e.data.__einstein) {
    const d = e.data;
    if (d.type === 'linkClick') send({ type:'link_click', linkText: d.text, href: d.href });
    if (d.type === 'imageTap') send({ type:'image_tap', alt: d.alt, src: d.src, width: d.width, height: d.height });
    if (d.type === 'scroll') send({ type:'scroll', offsetY: d.offsetY, contentHeight: d.contentHeight, viewHeight: d.viewHeight, direction: d.direction });
    if (d.type === 'keystroke') send({ type:'keystroke', character: d.character, currentText: d.currentText, source:'iframe' });
    if (d.type === 'search') send({ type:'search', query: d.query, source:'iframe' });
    if (d.type === 'navigation') {
      currentPage = { type:'webview', url: d.url, title: d.title };
      tabs[0] = { title: d.title, host: hostFromUrl(d.url), type:'webview' };
      updateUrlBar(hostFromUrl(d.url), true);
      send({ type:'page_loaded', url: d.url, title: d.title });
    }
  }
});

// Lifecycle
window.addEventListener('pagehide', () => send({ type:'app_state', state:'background' }));
window.addEventListener('pageshow', (e) => {
  send({ type:'app_state', state:'active', fromCache: !!e.persisted });
  if (!ws || ws.readyState >= 2) connectWS();
  else resyncState();
});
document.addEventListener('visibilitychange', () => {
  const state = document.hidden ? 'inactive' : 'active';
  send({ type:'app_state', state });
  if (!document.hidden && (!ws || ws.readyState >= 2)) connectWS();
});
setInterval(() => { if (ws && ws.readyState === 1) send({ type:'ping' }); }, 25000);

// Init
renderFavorites();
connectWS();
send({ type:'app_state', state:'launched' });
</script>
