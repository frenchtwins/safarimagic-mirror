<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstein — Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1a1a2e;
    border-radius: 20px;
    padding: 28px 22px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #00d4ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub { color: #888; font-size: 13px; margin-bottom: 18px; }

  /* Status HUGE — no ambiguity */
  .hero {
    padding: 28px 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    text-align: center;
    transition: all 0.3s;
    border: 3px solid transparent;
  }
  .hero.classic {
    background: linear-gradient(135deg, #1e3a5f, #2a5a8e);
    border-color: #5bc0eb;
  }
  .hero.modern {
    background: linear-gradient(135deg, #5f1e3a, #8e2a5a);
    border-color: #ff6bc0;
  }
  .hero-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 6px;
  }
  .hero-mode {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 8px;
  }
  .hero-warn {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    opacity: 0.95;
    line-height: 1.4;
  }
  .classic .hero-warn::before { content: "✅ "; }
  .modern .hero-warn::before { content: "🎭 "; }

  .meta {
    display: flex;
    justify-content: space-between;
    background: #0f0f1e;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 18px;
    font-size: 12px;
  }
  .meta-row { color: #888; }
  .meta-row strong { color: #e0e0e0; }

  input[type=password] {
    width: 100%;
    padding: 14px 16px;
    background: #0f0f1e;
    border: 1px solid #2a2a3e;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    margin-bottom: 12px;
  }
  input[type=password]:focus { outline: none; border-color: #00d4ff; }

  button {
    width: 100%;
    padding: 18px;
    border-radius: 14px;
    border: none;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 10px;
  }
  button:active { transform: scale(0.97); }
  .btn-classic {
    background: linear-gradient(135deg, #1e3a5f, #2a5a8e);
    color: #aee1ff;
    border: 2px solid #5bc0eb;
  }
  .btn-modern {
    background: linear-gradient(135deg, #5f1e3a, #8e2a5a);
    color: #ffaee1;
    border: 2px solid #ff6bc0;
  }
  .btn-classic.active, .btn-modern.active {
    box-shadow: 0 0 0 4px rgba(255,255,255,0.15);
  }

  .log {
    margin-top: 14px;
    font-size: 13px;
    font-family: 'SF Mono', Menlo, monospace;
    min-height: 20px;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
  }
  .log.error { color: #ff6b6b; }
  .log.success { color: #00ff88; }

  .reminder {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    background: rgba(255, 170, 0, 0.1);
    border: 1px solid rgba(255, 170, 0, 0.3);
    font-size: 12px;
    color: #ffaa00;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🎭 Einstein Admin</h1>
  <div class="sub">Contrôle à distance du thème de l'app</div>

  <div class="hero classic" id="hero">
    <div class="hero-label">Mode actif sur l'app</div>
    <div class="hero-mode" id="heroMode">…</div>
    <div class="hero-warn" id="heroWarn">Chargement…</div>
  </div>

  <div class="meta">
    <span class="meta-row">📱 <strong id="phoneStatus">…</strong></span>
    <span class="meta-row">🕐 dernière MAJ : <strong id="lastSwitch">—</strong></span>
  </div>

  <input type="password" id="pw" placeholder="Mot de passe admin" autocomplete="current-password" />

  <button class="btn-classic" id="btnClassic" onclick="setTheme('classic')">
    ✅ CLASSIC (safe pour review Apple)
  </button>
  <button class="btn-modern" id="btnModern" onclick="setTheme('modern')">
    🎭 MODERN (Safari pixel-perfect, SHOW)
  </button>

  <div class="log" id="log">Entre ton mdp + clique sur le mode voulu</div>

  <div class="reminder" id="reminder">
    ⚠️ <strong>IMPORTANT</strong> : l'app ne se met à jour qu'<strong>au prochain lancement</strong> du téléphone. Force quit + relance après un switch.
  </div>
</div>

<script>
let lastSwitchTs = localStorage.getItem('lastSwitch') || null;

async function refresh() {
  try {
    const [cfg, ping] = await Promise.all([
      fetch('/config.json', { cache: 'no-store' }).then(r => r.json()),
      fetch('/ping').then(r => r.json())
    ]);
    const mode = cfg.theme || 'classic';
    const hero = document.getElementById('hero');
    hero.className = 'hero ' + mode;
    document.getElementById('heroMode').textContent = mode.toUpperCase();

    const warn = document.getElementById('heroWarn');
    if (mode === 'classic') {
      warn.textContent = 'Icône GLOBE + UI browser simple. Safe pour review Apple.';
    } else {
      warn.textContent = 'Icône SAFARI + UI pixel-perfect Safari. Ne JAMAIS laisser ça pendant une review Apple !';
    }

    document.getElementById('phoneStatus').textContent = ping.phoneConnected ? '🟢 connecté' : '⚫️ déconnecté';
    document.getElementById('lastSwitch').textContent = lastSwitchTs || '—';

    document.getElementById('btnClassic').classList.toggle('active', mode === 'classic');
    document.getElementById('btnModern').classList.toggle('active', mode === 'modern');
  } catch (e) { log('Erreur de refresh : ' + e.message, true); }
}

async function setTheme(theme) {
  const pw = document.getElementById('pw').value;
  if (!pw) { log('Mot de passe requis', true); return; }

  // Confirm before switching to modern (danger zone)
  if (theme === 'modern' && !confirm('⚠️ Activer MODERN ?\n\nL\'app va afficher l\'icône Safari + UI pixel-perfect. NE JAMAIS laisser ça pendant une review Apple.\n\nContinuer ?')) return;

  try {
    const r = await fetch('/admin/set?password=' + encodeURIComponent(pw) + '&theme=' + theme, { method: 'POST' });
    if (!r.ok) { log(r.status === 401 ? '❌ Mot de passe invalide' : '❌ Erreur ' + r.status, true); return; }
    lastSwitchTs = new Date().toLocaleString('fr-FR');
    localStorage.setItem('lastSwitch', lastSwitchTs);
    log('✓ → ' + theme.toUpperCase());
    refresh();
  } catch (e) { log('Erreur : ' + e.message, true); }
}

function log(msg, isError) {
  const el = document.getElementById('log');
  el.className = 'log ' + (isError ? 'error' : 'success');
  el.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
}

refresh();
setInterval(refresh, 4000);
</script>

</body>
</html>
