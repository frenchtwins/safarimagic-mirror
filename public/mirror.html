<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstein · Mirror</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }

  :root {
    --accent: #0a84ff;
    --accent-2: #bf5af2;
    --accent-3: #ff375f;
    --green: #30d158;
    --orange: #ff9f0a;
    --text: rgba(255, 255, 255, 0.95);
    --text-dim: rgba(255, 255, 255, 0.55);
    --text-faint: rgba(255, 255, 255, 0.3);
    --glass: rgba(255, 255, 255, 0.05);
    --glass-stronger: rgba(255, 255, 255, 0.08);
    --stroke: rgba(255, 255, 255, 0.1);
  }

  html, body {
    background: #000;
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* Ambient aurora background */
  body::before, body::after {
    content: '';
    position: fixed;
    inset: -30%;
    z-index: 0;
    pointer-events: none;
    filter: blur(140px);
    opacity: 0.45;
    animation: drift 30s ease-in-out infinite alternate;
  }
  body::before {
    background:
      radial-gradient(circle at 20% 30%, #0a84ff 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, #bf5af2 0%, transparent 45%);
  }
  body::after {
    background:
      radial-gradient(circle at 70% 20%, #ff375f 0%, transparent 40%),
      radial-gradient(circle at 30% 80%, #30d158 0%, transparent 40%);
    animation-duration: 36s;
    animation-direction: alternate-reverse;
    opacity: 0.25;
  }
  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-10%, 8%) scale(1.2); }
  }

  /* Glass utility */
  .glass {
    background: var(--glass);
    backdrop-filter: saturate(180%) blur(40px);
    -webkit-backdrop-filter: saturate(180%) blur(40px);
    border: 1px solid var(--stroke);
    border-radius: 22px;
  }

  /* ===== HEADER ===== */
  .header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--stroke);
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: saturate(180%) blur(30px);
    -webkit-backdrop-filter: saturate(180%) blur(30px);
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, #a8c5ff 50%, #bf5af2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 6px;
    background: var(--glass);
    border: 1px solid var(--stroke);
    color: var(--text-dim);
  }
  .status {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-3);
    box-shadow: 0 0 8px var(--accent-3);
  }
  .status-dot.connected {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .actions { display: flex; gap: 8px; }
  .btn {
    padding: 9px 14px;
    border-radius: 12px;
    border: 1px solid var(--stroke);
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--glass-stronger); border-color: rgba(255,255,255,0.18); }
  .btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: #fff;
  }

  /* ===== LAYOUT ===== */
  .main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(320px, 400px) 1fr minmax(320px, 420px);
    gap: 20px;
    padding: 20px;
    height: calc(100vh - 56px);
  }

  /* ===== PHONE PANEL ===== */
  .phone-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .phone {
    position: relative;
    width: min(280px, 100%);
    aspect-ratio: 9 / 19.5;
    background: #000;
    border-radius: 44px;
    padding: 8px;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.06),
      0 30px 80px rgba(0,0,0,0.7),
      0 0 140px rgba(10, 132, 255, 0.15);
  }
  .phone-bezel {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 38px;
    background: #0a0a0a;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  /* Live image fills the ENTIRE bezel, edge to edge */
  .live-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: none;
    z-index: 1;
  }
  .live-frame.active { display: block; }

  /* Default state (no live) */
  .phone-idle {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 2;
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
    padding: 40px 20px;
  }
  .phone-idle.hidden { display: none; }
  .phone-idle .ring {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--stroke);
    border-top-color: var(--accent);
    animation: spin 1.5s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Dynamic Island overlay */
  .island {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 32px;
    background: #000;
    border-radius: 20px;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  /* Show island only when live is active */
  .live-frame.active ~ .island { opacity: 1; }

  /* Touch dot overlay */
  .touch-dot {
    position: absolute;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(10,132,255,0.8) 0%, rgba(10,132,255,0) 70%);
    z-index: 10;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: ripple 0.6s ease-out;
  }
  @keyframes ripple {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
  }

  .phone-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .phone-label .name { color: var(--text); font-weight: 600; margin-left: 4px; }

  /* Scroll indicator */
  .scroll-indicator {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 10px 18px;
    border-radius: 14px;
  }
  .scroll-text {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .scroll-bar {
    width: 180px; height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .scroll-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 2px;
    transition: width 0.3s;
    box-shadow: 0 0 8px var(--accent);
  }

  /* ===== BIG TEXT CENTER ===== */
  .center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .typing-card {
    padding: 40px 30px;
    min-width: 400px;
    max-width: 100%;
    text-align: center;
  }
  .typing-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 16px;
  }
  .typing-text {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, #a8c5ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    min-height: 1.2em;
    word-break: break-word;
  }
  .typing-text.empty { color: var(--text-faint); -webkit-text-fill-color: var(--text-faint); font-weight: 500; font-size: 28px; }
  .typing-sub {
    margin-top: 20px;
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* ===== TIMELINE ===== */
  .timeline-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }
  .timeline-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--stroke);
    display: flex; align-items: center; justify-content: space-between;
  }
  .timeline-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .timeline-count {
    font-size: 12px;
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--glass-stronger);
  }
  .timeline {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .timeline::-webkit-scrollbar { width: 6px; }
  .timeline::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .event {
    display: flex; gap: 10px;
    padding: 12px 14px;
    border-radius: 14px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    transition: all 0.2s;
    animation: slideIn 0.3s cubic-bezier(0.2, 0, 0, 1);
  }
  .event:hover { background: var(--glass); border-color: var(--stroke); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .event-time {
    font-size: 10px;
    color: var(--text-faint);
    font-family: 'SF Mono', monospace;
    min-width: 44px;
    padding-top: 3px;
    font-weight: 500;
  }
  .event-icon {
    width: 28px; height: 28px;
    flex-shrink: 0;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: var(--glass-stronger);
  }
  .event-body { flex: 1; min-width: 0; }
  .event-label {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .event-text {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    word-break: break-word;
    line-height: 1.4;
  }
  .event-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ===== FULLSCREEN LIVE ===== */
  .fullscreen-live {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .fullscreen-live.active { display: flex; }
  .fullscreen-live img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .exit-btn {
    position: absolute;
    top: 20px; right: 20px;
    padding: 10px 18px;
    border-radius: 100px;
    border: 1px solid var(--stroke);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1100px) {
    .main { grid-template-columns: 320px 1fr; }
    .timeline-panel { display: none; }
  }
  @media (max-width: 768px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      height: auto;
      min-height: calc(100vh - 56px);
    }
    .phone { width: 240px; }
    .typing-card { min-width: 0; padding: 24px 20px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="logo">Einstein</div>
    <div class="tag">Mirror</div>
  </div>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connexion…</span>
  </div>
  <div class="actions">
    <button class="btn" id="btnLive" onclick="toggleLiveFullscreen()">📺 Live full</button>
    <button class="btn" onclick="clearLog()">🗑 Effacer</button>
    <a class="btn" href="/admin" style="text-decoration:none;">🎭 Admin</a>
  </div>
</header>

<div class="main">

  <!-- PHONE PANEL -->
  <div class="phone-panel">
    <div class="phone">
      <div class="phone-bezel">
        <img class="live-frame" id="liveFrame" alt="Live" />
        <div class="phone-idle" id="phoneIdle">
          <div class="ring"></div>
          <div>En attente du téléphone…</div>
        </div>
        <div class="island"></div>
        <div class="touch-dot" id="touchDot" style="display:none;"></div>
      </div>
    </div>
    <div class="phone-label">📱<span class="name" id="phoneName">iPhone du spectateur</span></div>
    <div class="scroll-indicator glass">
      <div class="scroll-text" id="scrollText">—</div>
      <div class="scroll-bar"><div class="scroll-fill" id="scrollFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- CENTER: BIG TYPING -->
  <div class="center-panel">
    <div class="typing-card glass">
      <div class="typing-label">Recherche en direct</div>
      <div class="typing-text empty" id="typingText">en attente…</div>
      <div class="typing-sub" id="typingSub">Le spectateur n'a pas encore tapé</div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="timeline-panel glass">
    <div class="timeline-header">
      <div class="timeline-title">Timeline</div>
      <div class="timeline-count" id="eventCount">0</div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

</div>

<div class="fullscreen-live" id="fullscreenLive">
  <button class="exit-btn" onclick="toggleLiveFullscreen()">✕ Quitter</button>
  <img id="liveFrameFullscreen" alt="Live Fullscreen" />
</div>

<script>
let ws = null;
let currentTyping = '';
let events = [];
let isLiveFullscreen = false;

function connect() {
  const wsUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/ws';
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connecté au serveur';
    ws.send(JSON.stringify({ type: 'identify', role: 'mirror' }));
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch (err) { console.error(err); }
  };

  ws.onclose = () => {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = 'Déconnecté — reconnexion…';
    setTimeout(connect, 2000);
  };
}

function handleMessage(msg) {
  // Initial event log
  if (msg.type === 'event_log') {
    (msg.events || []).forEach(e => addEvent(e));
    updatePhoneStatus(msg.phoneConnected);
    return;
  }

  if (msg.type === 'phone_connected') {
    updatePhoneStatus(true);
    return;
  }
  if (msg.type === 'phone_disconnected') {
    updatePhoneStatus(false);
    document.getElementById('liveFrame').classList.remove('active');
    document.getElementById('phoneIdle').classList.remove('hidden');
    return;
  }

  // Screen frames (live)
  if (msg.type === 'screen' && msg.frame) {
    const src = 'data:image/jpeg;base64,' + msg.frame;
    const img = document.getElementById('liveFrame');
    img.src = src;
    img.classList.add('active');
    document.getElementById('phoneIdle').classList.add('hidden');
    const fsImg = document.getElementById('liveFrameFullscreen');
    if (fsImg) fsImg.src = src;
    return;
  }

  // Clear
  if (msg.type === 'clear') {
    events = [];
    renderTimeline();
    currentTyping = '';
    updateTyping('', '');
    return;
  }

  // Keystroke — build up typing display
  if (msg.type === 'keystroke') {
    if (msg.character === '⌫') {
      currentTyping = currentTyping.slice(0, -1);
    } else if (msg.character) {
      currentTyping += msg.character;
    }
    updateTyping(currentTyping, 'en train de taper…');
    addEvent(msg);
    return;
  }

  // Search
  if (msg.type === 'search') {
    currentTyping = msg.query || '';
    updateTyping(currentTyping, 'recherche validée');
    addEvent(msg);
    return;
  }

  // Touch
  if (msg.type === 'touch') {
    showTouch(msg);
    return;
  }

  // Scroll
  if (msg.type === 'scroll') {
    updateScroll(msg);
    return;
  }

  // Other events
  addEvent(msg);
}

function updatePhoneStatus(connected) {
  const dot = document.getElementById('statusDot');
  if (connected) {
    dot.classList.add('connected');
    document.getElementById('statusText').textContent = 'Téléphone connecté · live';
  } else {
    dot.classList.remove('connected');
    document.getElementById('statusText').textContent = 'Téléphone hors ligne';
  }
}

function updateTyping(text, sub) {
  const el = document.getElementById('typingText');
  const sel = document.getElementById('typingSub');
  if (!text) {
    el.className = 'typing-text empty';
    el.textContent = 'en attente…';
    sel.textContent = 'Le spectateur n\'a pas encore tapé';
  } else {
    el.className = 'typing-text';
    el.textContent = text;
    sel.textContent = sub || '';
  }
}

function updateScroll(msg) {
  const depth = msg.contentHeight > 0 ? Math.round((msg.offsetY || 0) / Math.max(1, msg.contentHeight - (msg.viewHeight||0)) * 100) : 0;
  document.getElementById('scrollFill').style.width = Math.min(100, Math.max(0, depth)) + '%';
  document.getElementById('scrollText').textContent = (msg.direction || '') + ' · ' + depth + '%';
}

function showTouch(msg) {
  const dot = document.getElementById('touchDot');
  const frame = document.querySelector('.phone-bezel');
  const r = frame.getBoundingClientRect();
  const relX = msg.x / (msg.screenWidth || 1);
  const relY = msg.y / (msg.screenHeight || 1);
  dot.style.left = (relX * r.width) + 'px';
  dot.style.top = (relY * r.height) + 'px';
  dot.style.display = 'block';
  dot.style.animation = 'none';
  void dot.offsetWidth;
  dot.style.animation = 'ripple 0.6s ease-out';
  setTimeout(() => { dot.style.display = 'none'; }, 600);
}

function addEvent(e) {
  // Skip noise: raw touches are shown as ripples on the phone mockup, not in timeline
  if (e.type === 'touch') return;
  // Dedupe consecutive identical app_state events
  if (e.type === 'app_state' && events[0] && events[0].type === 'app_state' && events[0].state === e.state) return;
  // Coalesce rapid keystrokes: keep only the last one per "typing burst"
  if (e.type === 'keystroke' && events[0] && events[0].type === 'keystroke') {
    const last = new Date(events[0].timestamp || 0).getTime();
    const now = new Date(e.timestamp || 0).getTime();
    if (now - last < 1500) { events[0] = e; renderTimeline(); return; }
  }
  events.unshift(e);
  if (events.length > 80) events = events.slice(0, 80);
  renderTimeline();
}

function renderTimeline() {
  const list = document.getElementById('timeline');
  document.getElementById('eventCount').textContent = events.length;
  list.innerHTML = events.map(e => renderEvent(e)).join('');
}

function renderEvent(e) {
  const time = e.timestamp ? new Date(e.timestamp).toLocaleTimeString('fr-FR', { hour12: false }).slice(0, 8) : '—';
  const [icon, label, text, meta] = eventVisuals(e);
  return `
    <div class="event">
      <div class="event-time">${escape(time)}</div>
      <div class="event-icon">${icon}</div>
      <div class="event-body">
        <div class="event-label">${escape(label)}</div>
        ${text ? `<div class="event-text">${escape(text)}</div>` : ''}
        ${meta ? `<div class="event-meta">${escape(meta)}</div>` : ''}
      </div>
    </div>
  `;
}

function eventVisuals(e) {
  switch (e.type) {
    case 'keystroke': {
      const c = e.character === '⌫' ? 'retour arrière' : ('« ' + (e.character || '') + ' »');
      return ['⌨️', 'Frappe clavier', e.currentText ? '« ' + e.currentText + ' »' : c, e.currentText ? 'touche : ' + c : ''];
    }
    case 'search':
      return ['🔍', 'Recherche validée', '« ' + (e.query || '') + ' »', e.url ? '→ ' + hostFromUrl(e.url) : ''];
    case 'link_click':
      return ['👆', 'Clic sur un lien', e.linkText ? '« ' + e.linkText + ' »' : '(lien sans texte)', e.href ? hostFromUrl(e.href) : ''];
    case 'image_tap': {
      const dims = (e.width && e.height) ? ' · ' + e.width + '×' + e.height : '';
      return ['🖼️', 'Clic sur image', e.alt ? '« ' + e.alt + ' »' : '(image sans légende)', (e.src ? hostFromUrl(e.src) : '') + dims];
    }
    case 'navigation':
      return ['🧭', 'Navigation', e.title || hostFromUrl(e.url || ''), e.url || ''];
    case 'page_loaded':
      return ['📄', 'Page chargée', e.title || 'sans titre', e.url ? hostFromUrl(e.url) : ''];
    case 'scroll': {
      const arrow = e.direction === 'down' ? '⬇️' : '⬆️';
      const pct = e.contentHeight ? Math.round((e.offsetY||0) / Math.max(1, e.contentHeight - (e.viewHeight||0)) * 100) : 0;
      return [arrow, 'Défilement ' + (e.direction === 'down' ? 'bas' : 'haut'), Math.max(0, Math.min(100, pct)) + '% de la page', ''];
    }
    case 'touch': {
      const kind = e.touchType === 'end' ? 'relâche' : (e.touchType === 'move' ? 'déplacement' : 'appui');
      return ['👇', 'Touche écran · ' + kind, 'x=' + Math.round(e.x||0) + ' · y=' + Math.round(e.y||0), ''];
    }
    case 'app_state': {
      const s = e.state || '—';
      const emoji = s === 'active' ? '▶️' : s === 'inactive' ? '⏸️' : s === 'background' ? '🌙' : s === 'launched' ? '🚀' : '📱';
      const label = s === 'active' ? 'App au premier plan' : s === 'inactive' ? 'App inactive' : s === 'background' ? 'App en arrière-plan' : s === 'launched' ? 'App lancée' : 'État app';
      return [emoji, label, '', ''];
    }
    case 'phone_connected': return ['🟢', 'Téléphone connecté', 'Le spectateur est prêt', ''];
    case 'phone_disconnected': return ['🔴', 'Téléphone déconnecté', 'Perte de connexion', ''];
    case 'clear': return ['🧹', 'Timeline effacée', '', ''];
    default: return ['•', e.type || 'Event', '', ''];
  }
}

function hostFromUrl(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url || ''; }
}

function escape(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

async function clearLog() {
  await fetch('/clear', { method: 'POST' });
  events = [];
  renderTimeline();
  currentTyping = '';
  updateTyping('', '');
}

function toggleLiveFullscreen() {
  isLiveFullscreen = !isLiveFullscreen;
  document.getElementById('fullscreenLive').classList.toggle('active', isLiveFullscreen);
  document.getElementById('btnLive').classList.toggle('active', isLiveFullscreen);
  if (isLiveFullscreen && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
  else if (!isLiveFullscreen && document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
}

connect();
</script>
