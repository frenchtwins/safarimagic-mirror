<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstein · Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }

  :root {
    --accent: #0a84ff;
    --accent-2: #bf5af2;
    --accent-3: #ff375f;
    --green: #30d158;
    --orange: #ff9f0a;
    --text: rgba(255, 255, 255, 0.95);
    --text-dim: rgba(255, 255, 255, 0.55);
    --text-faint: rgba(255, 255, 255, 0.3);
    --glass: rgba(255, 255, 255, 0.05);
    --glass-hover: rgba(255, 255, 255, 0.08);
    --stroke: rgba(255, 255, 255, 0.1);
  }

  html, body {
    background: #000;
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* Aurora ambient */
  body::before, body::after {
    content: '';
    position: fixed; inset: -30%; z-index: 0; pointer-events: none;
    filter: blur(140px); opacity: 0.45;
    animation: drift 30s ease-in-out infinite alternate;
  }
  body::before {
    background: radial-gradient(circle at 20% 30%, #0a84ff 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #bf5af2 0%, transparent 45%);
  }
  body::after {
    background: radial-gradient(circle at 70% 20%, #ff375f 0%, transparent 40%),
                radial-gradient(circle at 30% 80%, #30d158 0%, transparent 40%);
    animation-duration: 36s; animation-direction: alternate-reverse; opacity: 0.25;
  }
  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-10%, 8%) scale(1.2); }
  }

  /* STEALTH MODE: blur everything */
  body.stealth main { filter: blur(20px); opacity: 0.2; pointer-events: none; transition: all 0.3s; }
  body.stealth .stealth-overlay { display: flex; }

  .stealth-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    cursor: pointer;
  }
  .stealth-msg {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .glass {
    background: var(--glass);
    backdrop-filter: saturate(180%) blur(40px);
    -webkit-backdrop-filter: saturate(180%) blur(40px);
    border: 1px solid var(--stroke);
    border-radius: 24px;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--stroke);
    background: rgba(0,0,0,0.35);
    backdrop-filter: saturate(180%) blur(30px);
  }
  .brand-wrap { display: flex; align-items: center; gap: 14px; }
  .brand {
    font-size: 20px; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, #a8c5ff 50%, #bf5af2 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tag-mirror {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px;
    background: var(--glass); border: 1px solid var(--stroke); color: var(--text-dim);
  }
  .status {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-3); box-shadow: 0 0 8px var(--accent-3);
  }
  .status-dot.on {
    background: var(--green); box-shadow: 0 0 10px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .top-actions { display: flex; gap: 8px; }
  .btn {
    padding: 9px 14px;
    border-radius: 12px;
    border: 1px solid var(--stroke);
    background: var(--glass);
    color: var(--text);
    font-family: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }
  .btn:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.2); }
  .btn-danger { background: linear-gradient(135deg, #5f1e1e, #8e2a2a); border-color: rgba(255,100,100,0.3); }
  .btn-stealth { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); }

  /* ===== MAIN LAYOUT ===== */
  main {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 20px;
    padding: 20px;
    height: calc(100vh - 56px);
  }

  /* HERO — giant action card */
  .hero {
    padding: 50px 50px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 50%, rgba(10,132,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.6s;
  }
  .hero.active::before { opacity: 1; }

  .hero-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-faint);
    position: relative;
  }

  .hero-action {
    display: flex;
    align-items: flex-start;
    gap: 32px;
    position: relative;
  }
  .hero-emoji {
    font-size: 72px;
    line-height: 1;
    flex-shrink: 0;
    filter: drop-shadow(0 8px 20px rgba(10,132,255,0.4));
  }
  .hero-body { flex: 1; min-width: 0; }
  .hero-title {
    font-size: clamp(40px, 5.5vw, 76px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, #a8c5ff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    word-break: break-word;
  }
  .hero-title.empty {
    -webkit-text-fill-color: var(--text-faint);
    font-weight: 500;
    font-size: clamp(30px, 4vw, 50px);
  }
  .hero-meta {
    font-size: clamp(16px, 1.8vw, 22px);
    color: var(--text-dim);
    font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
  }
  .hero-meta strong { color: var(--text); font-weight: 700; }

  .hero-bottom {
    display: flex; gap: 12px; align-items: center;
    position: relative;
  }
  .hero-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    background: var(--glass);
    border: 1px solid var(--stroke);
    color: var(--text);
  }
  .hero-chip .val { color: var(--text-dim); }

  /* ===== RIGHT COLUMN ===== */
  .right {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
  }

  /* Phone thumbnail (small, optional) */
  .phone-thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 9 / 19.5;
    max-height: 45vh;
    background: #000;
    border-radius: 28px;
    padding: 6px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 16px 40px rgba(0,0,0,0.6);
  }
  .phone-bezel {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 22px;
    background: #0a0a0a;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .live-frame {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: none;
  }
  .live-frame.active { display: block; }
  .phone-idle {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-faint); font-size: 12px; text-align: center; padding: 20px;
  }
  .phone-idle.hidden { display: none; }
  .island {
    position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    width: 70px; height: 22px;
    background: #000;
    border-radius: 14px;
    z-index: 5; opacity: 0;
  }
  .live-frame.active ~ .island { opacity: 1; }

  /* Mini ticker */
  .ticker {
    flex: 1; min-height: 0;
    padding: 14px 0;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .ticker-title {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-faint);
    padding: 0 16px 10px;
    border-bottom: 1px solid var(--stroke);
  }
  .ticker-list {
    flex: 1; overflow-y: auto;
    padding: 8px 12px;
  }
  .ticker-list::-webkit-scrollbar { width: 4px; }
  .ticker-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .tick {
    display: flex; gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    font-size: 13px;
    animation: slideIn 0.3s cubic-bezier(0.2, 0, 0, 1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .tick:hover { background: var(--glass); }
  .tick-emoji { font-size: 16px; flex-shrink: 0; line-height: 1.2; }
  .tick-body { flex: 1; min-width: 0; overflow: hidden; }
  .tick-text {
    color: var(--text);
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tick-time { font-size: 10px; color: var(--text-faint); margin-top: 1px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .hero { padding: 30px 24px; gap: 20px; }
    .hero-emoji { font-size: 56px; }
    .right { flex-direction: row; gap: 12px; }
    .phone-thumb { width: 140px; max-height: none; flex-shrink: 0; }
    .ticker { flex: 1; }
  }
</style>
</head>
<body>

<div class="stealth-overlay" id="stealthOverlay" onclick="toggleStealth()">
  <div class="stealth-msg">clic pour révéler</div>
</div>

<header class="topbar">
  <div class="brand-wrap">
    <div class="brand">Einstein</div>
    <div class="tag-mirror">Mirror</div>
  </div>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connexion…</span>
  </div>
  <div class="top-actions">
    <button class="btn btn-stealth" onclick="toggleStealth()" title="Cacher l'écran (Cmd+H)">🫥 Stealth</button>
    <button class="btn btn-danger" onclick="clearLog()">🗑 Clear</button>
    <a class="btn" href="/admin">🎭 Admin</a>
  </div>
</header>

<main>

  <!-- HERO (giant current action) -->
  <div class="hero glass" id="hero">
    <div class="hero-label" id="heroLabel">En attente du spectateur</div>
    <div class="hero-action">
      <div class="hero-emoji" id="heroEmoji">📱</div>
      <div class="hero-body">
        <div class="hero-title empty" id="heroTitle">rien pour l'instant</div>
        <div class="hero-meta" id="heroMeta">Dès qu'il tape, clique ou navigue, ça s'affichera ici en énorme.</div>
      </div>
    </div>
    <div class="hero-bottom" id="heroBottom"></div>
  </div>

  <!-- Right column: phone thumb + mini ticker -->
  <div class="right">
    <div class="phone-thumb">
      <div class="phone-bezel">
        <img class="live-frame" id="liveFrame" alt="Live" />
        <div class="phone-idle" id="phoneIdle">…</div>
        <div class="island"></div>
      </div>
    </div>
    <div class="ticker glass">
      <div class="ticker-title">Historique</div>
      <div class="ticker-list" id="tickerList"></div>
    </div>
  </div>

</main>

<script>
let ws = null;
let currentTyping = '';
let events = [];
let currentPage = null;

function connect() {
  const wsUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/ws';
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus(false, 'Connecté au serveur');
    ws.send(JSON.stringify({ type: 'identify', role: 'mirror' }));
  };
  ws.onmessage = (e) => { try { handle(JSON.parse(e.data)); } catch (err) { console.error(err); } };
  ws.onclose = () => { setStatus(false, 'Déconnecté — reconnexion…'); setTimeout(connect, 2000); };
}

function setStatus(phoneOn, text) {
  document.getElementById('statusDot').classList.toggle('on', phoneOn);
  document.getElementById('statusText').textContent = text;
}

function handle(msg) {
  if (msg.type === 'event_log') {
    (msg.events || []).slice(-20).forEach(e => { if (!isNoise(e)) addTick(e, false); });
    setStatus(msg.phoneConnected, msg.phoneConnected ? 'Téléphone connecté · live' : 'Téléphone hors ligne');
    return;
  }
  if (msg.type === 'phone_connected') { setStatus(true, 'Téléphone connecté · live'); return; }
  if (msg.type === 'phone_disconnected') {
    setStatus(false, 'Téléphone hors ligne');
    document.getElementById('liveFrame').classList.remove('active');
    return;
  }
  if (msg.type === 'screen' && msg.frame) {
    const img = document.getElementById('liveFrame');
    img.src = 'data:image/jpeg;base64,' + msg.frame;
    img.classList.add('active');
    document.getElementById('phoneIdle').classList.add('hidden');
    return;
  }
  if (msg.type === 'clear') { events = []; render(); updateHero(null); return; }

  if (msg.type === 'navigation' || msg.type === 'page_loaded') {
    currentPage = { url: msg.url, title: msg.title || '' };
  }
  if (msg.type === 'keystroke') {
    if (msg.character === '⌫') currentTyping = currentTyping.slice(0, -1);
    else if (msg.character) currentTyping += msg.character;
  }
  if (msg.type === 'search') currentTyping = msg.query || '';

  updateHero(msg);
  if (!isNoise(msg)) addTick(msg, true);
}

function isNoise(msg) {
  // Ignore in ticker: touch events, scroll, keystroke (too many), app_state duplicates
  if (msg.type === 'touch' || msg.type === 'scroll' || msg.type === 'keystroke') return true;
  if (msg.type === 'app_state' && events[0] && events[0].type === 'app_state' && events[0].state === msg.state) return true;
  if (msg.type === 'screen') return true;
  return false;
}

function updateHero(msg) {
  const title = document.getElementById('heroTitle');
  const meta = document.getElementById('heroMeta');
  const emoji = document.getElementById('heroEmoji');
  const label = document.getElementById('heroLabel');
  const hero = document.getElementById('hero');
  const bottom = document.getElementById('heroBottom');

  if (!msg) {
    label.textContent = 'En attente du spectateur';
    emoji.textContent = '📱';
    title.className = 'hero-title empty';
    title.textContent = 'rien pour l\'instant';
    meta.innerHTML = 'Dès qu\'il tape, clique ou navigue, ça s\'affichera ici en énorme.';
    bottom.innerHTML = '';
    hero.classList.remove('active');
    return;
  }

  hero.classList.add('active');
  const v = heroFor(msg);
  label.textContent = v.label;
  emoji.textContent = v.emoji;
  title.className = 'hero-title';
  title.textContent = v.title;
  meta.innerHTML = v.meta || '';
  bottom.innerHTML = v.chips ? v.chips.map(c => `<div class="hero-chip">${c}</div>`).join('') : '';
}

function heroFor(msg) {
  switch (msg.type) {
    case 'keystroke':
      return {
        label: 'Il tape en ce moment',
        emoji: '⌨️',
        title: currentTyping ? '« ' + currentTyping + ' »' : '(efface)',
        meta: 'Dernière touche : <strong>' + escape(msg.character || '') + '</strong>',
        chips: [`${currentTyping.length} caractères`]
      };
    case 'search':
      return {
        label: 'Il a validé sa recherche',
        emoji: '🔍',
        title: '« ' + (msg.query || '') + ' »',
        meta: 'Le spectateur a appuyé sur <strong>Entrée</strong>. Demande-lui ce qu\'il cherchait.',
        chips: msg.url ? [`🌐 ${hostFromUrl(msg.url)}`] : []
      };
    case 'link_click':
      return {
        label: 'Il a cliqué sur un lien',
        emoji: '👆',
        title: msg.linkText ? '« ' + msg.linkText + ' »' : '(lien sans texte)',
        meta: msg.href ? 'Va vers <strong>' + hostFromUrl(msg.href) + '</strong>' : '',
        chips: []
      };
    case 'image_tap':
      return {
        label: 'Il a cliqué sur une image',
        emoji: '🖼️',
        title: msg.alt ? '« ' + msg.alt + ' »' : '(image sans légende)',
        meta: (msg.width && msg.height) ? 'Dimensions <strong>' + msg.width + '×' + msg.height + '</strong>' : '',
        chips: msg.src ? [`🌐 ${hostFromUrl(msg.src)}`] : []
      };
    case 'navigation':
    case 'page_loaded': {
      const host = hostFromUrl(msg.url || '');
      return {
        label: 'Il est maintenant sur cette page',
        emoji: '📄',
        title: msg.title || host || '(sans titre)',
        meta: host ? '<strong>' + host + '</strong>' : '',
        chips: []
      };
    }
    case 'app_state': {
      const map = {
        active: { l: 'Il vient d\'ouvrir l\'app', e: '▶️', t: 'App au premier plan' },
        inactive: { l: 'App en pause', e: '⏸️', t: 'L\'app n\'est plus active' },
        background: { l: 'App en arrière-plan', e: '🌙', t: 'Il est sorti de l\'app' },
        launched: { l: 'Lancement', e: '🚀', t: 'L\'app démarre' }
      };
      const m = map[msg.state] || { l: 'État', e: '📱', t: msg.state || '' };
      return { label: m.l, emoji: m.e, title: m.t, meta: '', chips: [] };
    }
    default:
      return { label: msg.type || 'Event', emoji: '•', title: '', meta: '', chips: [] };
  }
}

function addTick(e, prepend) {
  if (prepend) events.unshift(e);
  else events.push(e);
  if (events.length > 30) events = events.slice(0, 30);
  render();
}

function render() {
  const list = document.getElementById('tickerList');
  list.innerHTML = events.map(e => renderTick(e)).join('');
}

function renderTick(e) {
  const time = e.timestamp ? new Date(e.timestamp).toLocaleTimeString('fr-FR', { hour12: false }).slice(0, 5) : '';
  const v = heroFor(e);
  return `
    <div class="tick">
      <div class="tick-emoji">${v.emoji}</div>
      <div class="tick-body">
        <div class="tick-text">${escape(v.label)} — ${escape(v.title)}</div>
        <div class="tick-time">${escape(time)}</div>
      </div>
    </div>
  `;
}

function hostFromUrl(url) { try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url || ''; } }
function escape(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function clearLog() {
  await fetch('/clear', { method: 'POST' });
  events = []; render();
  currentTyping = '';
  updateHero(null);
}

function toggleStealth() {
  document.body.classList.toggle('stealth');
}

// Keyboard shortcut: H to hide/reveal
document.addEventListener('keydown', (e) => {
  if (e.key === 'h' || e.key === 'H') { e.preventDefault(); toggleStealth(); }
  if (e.key === 'Escape' && document.body.classList.contains('stealth')) toggleStealth();
});

connect();
</script>

</body>
</html>
