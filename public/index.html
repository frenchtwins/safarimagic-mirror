<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstein</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body {
    background: #000;
    color: rgba(255,255,255,0.95);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }
  body::before, body::after {
    content: ''; position: fixed; inset: -30%; z-index: 0; pointer-events: none;
    filter: blur(140px); opacity: 0.5;
    animation: drift 30s ease-in-out infinite alternate;
  }
  body::before {
    background: radial-gradient(circle at 30% 20%, #0a84ff 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, #bf5af2 0%, transparent 45%);
  }
  body::after {
    background: radial-gradient(circle at 80% 30%, #ff375f 0%, transparent 40%),
                radial-gradient(circle at 20% 70%, #30d158 0%, transparent 40%);
    animation-duration: 36s; animation-direction: alternate-reverse; opacity: 0.3;
  }
  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-8%, 5%) scale(1.15); }
  }
  main {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 24px;
    text-align: center;
  }
  .brand {
    font-size: 13px; font-weight: 600; letter-spacing: 6px; text-transform: uppercase;
    color: rgba(255,255,255,0.55); margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 900; letter-spacing: -0.04em; line-height: 1;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #fff 0%, #a8c5ff 50%, #bf5af2 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: clamp(16px, 2vw, 20px); color: rgba(255,255,255,0.6);
    max-width: 560px; line-height: 1.5; margin-bottom: 40px;
  }
  .links { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  a.link {
    padding: 14px 24px;
    border-radius: 100px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: saturate(180%) blur(40px);
    -webkit-backdrop-filter: saturate(180%) blur(40px);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.95);
    font-size: 15px; font-weight: 600;
    text-decoration: none;
    transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    display: inline-flex; align-items: center; gap: 8px;
  }
  a.link:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-2px);
  }
  a.link.primary {
    background: linear-gradient(135deg, #0a84ff, #bf5af2);
    border-color: transparent;
    color: #fff;
  }
  a.link.primary:hover { box-shadow: 0 10px 30px rgba(10,132,255,0.4); }
  .footer {
    position: absolute; bottom: 20px; left: 0; right: 0;
    text-align: center;
    font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px;
  }
</style>
</head>
<body>
<main>
  <div class="brand">Les French Twins</div>
  <h1>Einstein</h1>
  <p class="tagline">Plateforme de contrôle pour l'app iOS. Mirror temps réel, admin distant, pipeline de déploiement.</p>
  <div class="links">
    <a class="link primary" href="/mirror">🪞 Ouvrir le Mirror</a>
    <a class="link" href="/admin">🎭 Admin</a>
    <a class="link" href="/privacy">🔒 Privacy</a>
  </div>
</main>
<div class="footer">Mirror v2.0 · safarimagic-mirror.onrender.com</div>
</body>
</html>
